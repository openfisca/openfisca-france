description: Taux d'imposition des gains d'acquisition d'actions gratuites attribuées avant le 28 septembre 2012 (case 3VF), pour la fraction des gains dépassant le plafond de 152 500 euros, et dont la durée de conservation des titres ne dépasse pas au moins deux ans
values:
  2000-01-01:
    value: 0.4
  2010-01-01:
    value: 0.41
metadata:
  short_label: Taux pour la fraction supérieure au seuil
  last_value_still_valid_on: "2026-03-31"
  reference:
    2010-01-01:
    - title: Article 200 A du Code général des impôts
      href: https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000023377886/2012-09-27/
      note: "est imposé au taux de 30 % à concurrence de la fraction annuelle qui n'excède pas 152 500 € et de 41 % au-delà."
  unit: /1
