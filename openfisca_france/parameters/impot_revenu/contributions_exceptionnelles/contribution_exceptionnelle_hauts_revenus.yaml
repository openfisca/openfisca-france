description: Barème de la contribution exceptionnelle sur les hauts revenus (CEHR)
documentation: |-
  La CEHR distingue le célibataire (ou assimilé) du couple marié ou pacsé soumis à imposition commune.
  Voir Art. 223 sexies du CGI.
reference:
  2011-01-01:
  - title: Article 223 sexies, I.1., du Code général des impôts
    href: https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000036427364
  - title: Loi 2011-1977 du 28/12/2011 (LF pour 2012) - art. 2
    href: https://www.legifrance.gouv.fr/affichTexte.do?cidTexte=JORFTEXT000025044460#LEGIARTI000025048418
