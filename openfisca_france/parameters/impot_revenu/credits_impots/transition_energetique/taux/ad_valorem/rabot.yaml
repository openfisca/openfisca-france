  documentation: |-
    Ce paramètre modélise les « coups de rabot » (réductions homothétiques) appliqués ex post aux taux du crédit d'impôt (CIDD puis CITE). Principe : les taux votés (« taux faciaux ») sont multipliés par un coefficient inférieur à 1, le résultat étant arrondi à l'unité inférieure (troncature au point de pourcentage entier). Les taux stockés dans `ad_valorem` — et la majoration `majoration_bouquet` — pour les années concernées sont donc les taux AVANT rabot ; le taux effectivement appliqué s'obtient en appliquant ce coefficient.

    Deux rabots successifs ont existé.

    1) 2011 — premier « coup de rabot » de 10 % (art. 105 de la LF 2011, décret n° 2011-520), coefficient 0,90. En 2011, la majoration « bouquet de travaux » n'existe pas encore (elle est instituée par la LF 2012). Le taux appliqué vaut donc simplement :
        taux_appliqué = plancher(taux_avant_rabot x 0,90)
    Reconstruction (taux en vigueur fin 2010 → taux 2011 publié) : 40 %→36, 25 %→22, 15 %→13, 50 %→45. Les troncatures 22,5→22 et 13,5→13 confirment l'arrondi à l'unité inférieure. Cas particulier du photovoltaïque : la base 2011 est 25 % (après la réduction propre au PV du 29.9.2010), d'où 25 %→22.

    2) 2012-2013 — second « coup de rabot » de 15 % (art. 83 de la LF 2012, décret n° 2012-547), coefficient 0,85. À partir de 2012 coexiste la majoration « bouquet » (+10 points) qui s'ajoute AVANT le rabot :
        taux_appliqué = plancher((taux_avant_rabot + majoration_bouquet_si_bouquet) x 0,85)
    Exemple (chaudière à micro-cogénération, taux avant rabot 21 %) : geste seul = plancher(21 % x 0,85) = 17 % ; bouquet = plancher((21 % + 10 pts) x 0,85) = 26 %. L'ajout de la majoration AVANT le rabot explique que l'écart geste seul / bouquet soit, après rabot et troncature, de +8 ou +9 points selon les gestes (et non un +8 uniforme).

    Les deux rabots ne se cumulent PAS l'un sur l'autre : le coefficient de 2012 (0,85) s'applique aux taux faciaux votés par la LF 2012 (art. 81), et non aux taux déjà rabotés de 2011. Pour une année donnée, on utilise le coefficient en vigueur cette année-là.

    À partir de 2014, le rabot est supprimé (valeur nulle) : les taux d'`ad_valorem` sont directement les taux appliqués. De même, avant 2011, aucun rabot homothétique n'existe : les taux stockés y sont déjà les taux appliqués.
