documentation: |-

  Dans le tableau Article D613-4 du CSS, appelé "c) Travailleurs indépendant mentionnés au 6° de l'article L. 611-1 lorsqu'ils exercent une activité de location de locaux d'habitation meublés de tourisme, définis conformément à l'article L. 324-1 du code du tourisme"

  Le dispositif existait probablement avant le 25 mai 2020, mais le code de la sécurité sociale a été remanié à cette date.
