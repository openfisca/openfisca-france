        note: Le plafond de ressources pour les salariés de plus de 30 ans passe de 1500 € à 1710 € nets par mois
documentation: |-
  Depuis le 6 janvier 2026, la garantie Visale est étendue aux salariés de plus de 30 ans avec un plafond de ressources de 1710 € nets/mois.
  Ce nouveau critère permet à davantage d'actifs d'accéder au logement privé dans un contexte de forte tension locative.
