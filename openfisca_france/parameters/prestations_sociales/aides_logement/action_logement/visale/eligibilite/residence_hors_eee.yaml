documentation: |-
  Il faut que le logement soit en France, mais l'état civil du demandeur peut ne pas être français.
  Pour plus d'informations, consulter https://www.visale.fr/faq/quelles-sont-les-conditions-deligibilite-relatives-a-letat-civil-du-demandeur/
